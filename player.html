<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Player</title>

    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
      }

      .container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .play {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.92);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 42px;
        cursor: pointer;
        text-decoration: none;
        color: black;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- video hanya preview -->
      <video poster="preview.jpg">
        <source src="video.mp4" type="video/mp4" />
      </video>

      <!-- klik langsung buka Shopee -->
      <a class="play" href="https://s.shopee.co.id/9pZB6TrVvI"> ▶ </a>
    </div>
  </body>
</html>
