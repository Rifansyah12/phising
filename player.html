<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Player</title>

    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
      }

      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <video autoplay muted loop playsinline controls>
      <source src="vidio.mp4" type="vidio/mp4" />
    </video>
  </body>
</html>
